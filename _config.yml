title: Triston Lee
description: Triston Lee's homepage on AI systems, software experiments, and public notes.
url: "https://triston-lee.github.io"
lang: zh-CN
timezone: Asia/Shanghai
theme: minima
permalink: pretty

author:
  name: Triston Lee
  location: Hangzhou, China
  bio: "Es gibt keine Tatsachen, nur Interpretationen."

plugins:
  - jekyll-feed
  - jekyll-seo-tag

header_pages:
  - about.md
  - projects.md
  - writing.md

minima:
  social_links:
    - { platform: github, user_url: "https://github.com/triston-lee" }

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      author: Triston Lee
